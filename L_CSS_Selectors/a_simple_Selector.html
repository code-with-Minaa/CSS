<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Selectors in CSS</title>
</head>
<body>
    <style>
        /* Element or HTML Selector */
        p{
            color: blueviolet;
            font-size: 50px;
        }
        /* Class Selector */
        .box
        {
            width: 100px;
            height: 100px;
            background-color: blue;
            font-size: small;
        }
    </style>
    <h1>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Inventore.</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Perferendis, facilis!</p>
    <div id="box">Hello this is ID selector</div>
    <div class="box">Hi this is class selector</div>
</body>
</html>
