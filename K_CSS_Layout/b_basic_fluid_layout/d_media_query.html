<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working with media query</title>
    <style>
        *
        {
            margin: 0;
            padding: 0;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        #mainWrap
        {
            width: 90%;
            height: auto;
            margin: auto;
        }
        .logo
        {
            width: 20%;
            height: 200px;
            background-color: blueviolet;
            float: left;
        }
        .banner
        {
            width: 20%;
            height: 200px;
            background-color: pink;
            float: left;
        }

        @media(max-width:767px)
        {
            .logo,
            .banner
            {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="mainWrap">
        <div class="logo">Logo here</div>
        <div class="banner">Banner here</div>
    </div>
</body>
</html>
