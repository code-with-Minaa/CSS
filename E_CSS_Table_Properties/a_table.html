%!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Properties using CSS</title>
    <style>
        table, th, td{
            border: 1px solid;
        }
        table{
            margin: 0 auto;
            border-collapse: collapse;
            text-align: center;
            background-color: antiquewhite;
            width:80% ;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tbody>
            <tr>
                <th>Roll</th>
                <th>Name</th>
                <th>Address</th>
            </tr>
        </thead>
        <tr>
            <td>1</td>
            <td>Ram</td>
            <td>ktm</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Shyam</td>
            <td>Pkr</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Hari</td>
            <td>Btl</td>
        </tr>
        </tbody>
    </table>
</body>
</html>
