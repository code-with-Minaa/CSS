<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Perpoties using CSS</title>
    <style>
        ul.circle
        {
            list-style: circle;
        }
        ul.square
        {
            list-style: square;
        }
    </style>
</head>
<body>
    <ul type="circle">
        <li>Ram</li>
        <li>Shyam</li>
        <li>Hari</li>
        <li>Pari</li>
        <li>Ramri</li>
    </ul>
    <ul type="square">
        <li>Ram</li>
        <li>Shyam</li>
        <li>Hari</li>
        <li>Pari</li>
        <li>Ramri</li>
    </ul>
</body>
</html>
